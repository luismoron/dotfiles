enable_audio_bell no

font_family     Terminess (TTF) Nerd Font Complete Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size  12.0

adjust_line_height  0
adjust_column_width 0

disable_ligatures never

mouse_hide_wait 3.0

background  #0f2232
background_opacity 0.90

map alt+ctrl+left   neighboring_window left
map alt+ctrl+right  neighboring_window right
map alt+ctrl+up     neighboring_window up
map alt+ctrl+down   neighboring_window down

detect_urls yes
sync_to_monitor yes
input_delay 3
repaint_delay 10

tab_bar_style powerline

cursor_shape beam
cursor_beam_thickness 1.8

inactive_tab_background   #019
active_tab_background     #16a085
inactive_tab_foreground   #ffffff
active_tab_foreground     #000000

tab_bar_margin_color black

map ctrl+shift+enter  new_window_with_cwd 
map ctrl+shift+t      new_tab_with_cwd 

confirm_os_window_close 0
shell zsh
